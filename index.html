<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告管理</title>
<style>
  :root{
    --bg:#14141a; --panel:#1c1c24; --panel-2:#23232d; --line:#33333f; --line-soft:#2a2a34;
    --ink:#e6e6ea; --ink-dim:#9a9aa6; --ink-faint:#6b6b78;
    --gold:#b59974; --blue:#5c7bbb; --green:#6f9a72;
    /* 遊戲內米白面板 */
    --cream:#f4efe5; --cream-2:#efe8da; --g-line:#ddd3c1;
    --g-active:#2f2a23; --g-tab:#b3a890; --g-title:#34302a; --g-sub:#c3bbab; --g-body:#5a564d;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:system-ui,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden;}

  .nav{display:flex; align-items:center; gap:14px; padding:10px 16px; border-bottom:1px solid var(--line); flex-shrink:0; flex-wrap:wrap;}
  .nav h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; white-space:nowrap;}
  .nav h1 .dot{color:var(--gold);}
  .tabs{display:flex; gap:4px;}
  .tab{font:inherit; font-size:13.5px; color:var(--ink-dim); background:transparent; border:1px solid transparent; border-radius:8px; padding:7px 14px; cursor:pointer; transition:.15s;}
  .tab:hover{color:var(--ink); background:var(--panel);}
  .tab.active{color:#1a1611; background:var(--gold); font-weight:600;}
  .nav .grow{flex:1;}
  .nav .io{display:flex; gap:6px;}
  .save-state{font-size:12px; color:var(--ink-faint); transition:color .3s; min-width:72px; text-align:right;}
  .save-state.on{color:var(--gold);}

  .view{flex:1; min-height:0; display:none;}
  .view.active{display:flex;}

  button{font:inherit; font-size:12.5px; color:var(--ink); background:var(--panel-2); border:1px solid var(--line); border-radius:7px; padding:6px 11px; cursor:pointer; transition:.15s; white-space:nowrap;}
  button:hover{border-color:var(--ink-faint);}
  button:active{transform:translateY(1px);}
  button:focus-visible{outline:2px solid var(--blue); outline-offset:1px;}
  button.primary{background:var(--gold); border-color:var(--gold); color:#1a1611; font-weight:600;}
  button.primary:hover{filter:brightness(1.07);}
  button.danger{color:#e79; border-color:#5a3340;}
  button.danger:hover{background:#3a1f29;}
  button.ghost{background:transparent;}
  button.sm{padding:4px 9px; font-size:11.5px;}
  input[type=text], select, textarea{font:inherit; color:var(--ink); background:#1a1a22; border:1px solid var(--line); border-radius:7px; outline:none;}
  input[type=text]:focus, select:focus, textarea:focus{border-color:var(--blue);}
  select{padding:7px 9px; font-size:13px;}
  input[type=color]{width:30px; height:30px; padding:0; border:1px solid var(--line); border-radius:7px; background:var(--panel-2); cursor:pointer; vertical-align:middle;}
  label.fld{display:flex; flex-direction:column; gap:4px; font-size:11.5px; color:var(--ink-faint);}
  label.fld input[type=text], label.fld select{padding:7px 9px; font-size:13px;}
  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-thumb{background:#454552; border-radius:5px;}

  /* ---------- 遊戲內樣式預覽 ---------- */
  .preview-wrap{flex:1; display:flex; justify-content:center; align-items:flex-start; padding:16px; background:#0c0c0f; overflow:auto;}
  .mockup{width:375px; max-width:100%; background:var(--cream); border-radius:14px; overflow:hidden; box-shadow:0 14px 36px rgba(0,0,0,.5); display:flex; flex-direction:column;}
  .g-tabs{display:flex; gap:26px; justify-content:center; padding:14px 0 10px; font-size:15px; color:var(--g-tab); border-bottom:1px solid var(--g-line);}
  .g-tabs .on{color:var(--g-active); font-weight:700; position:relative;}
  .g-tabs .on::after{content:""; position:absolute; left:50%; transform:translateX(-50%); bottom:-7px; width:62px; height:4px; border-radius:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .g-title{text-align:center; color:var(--g-title); font-size:16px; font-weight:700; padding:16px 18px 2px; line-height:1.4;}
  .g-sub{text-align:center; color:var(--g-sub); font-size:9.5px; letter-spacing:5px; padding-bottom:8px;}
  .pv{display:flex; flex-direction:column; width:100%; padding-bottom:14px;}
  .pv-image{width:calc(100% - 28px); margin:8px 14px; border-radius:8px; display:block; background:#e7e0d2;}
  .pv-image-error{margin:8px 14px; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:110px; gap:4px; background:#f3e3e3; color:#b5524f; font-size:13px; border:1px dashed #d99; border-radius:8px; text-align:center; padding:14px;}
  .pv-image-error small{color:#c98a8a;}
  .pv-text{padding:6px 18px; font-size:14.5px; line-height:1.78; color:var(--g-body); font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif; word-wrap:break-word;}
  .pv-empty{padding:46px 18px; text-align:center; color:#b3a; opacity:.4; font-size:13px;}
  .code-box{width:375px; max-width:100%; height:100%; min-height:300px;}
  .code-box textarea{width:100%; height:100%; resize:none; padding:14px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.6; background:#11111a;}

  /* ---------- 歷史公告 ---------- */
  .arc-side{flex:1; min-width:380px; border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0;}
  .arc-side .filters{padding:12px; display:flex; flex-direction:column; gap:8px; border-bottom:1px solid var(--line);}
  .arc-side .filters input[type=text]{padding:8px 10px; font-size:13px;}
  .arc-listhead{display:flex; align-items:center; justify-content:space-between; padding:7px 13px; border-bottom:1px solid var(--line); background:var(--panel); flex-shrink:0;}
  .arc-listhead .lh-left,.arc-listhead .lh-right{display:flex; align-items:center; gap:10px;}
  .arc-listhead .cnt{font-size:11.5px; color:var(--ink-faint); margin-right:2px;}
  .arc-listhead .cnt b{color:var(--ink-dim); font-weight:600;}
  .sortbtn{cursor:pointer; user-select:none; font-size:11.5px; color:var(--ink-faint); display:inline-flex; align-items:center; gap:3px; padding:4px 9px; border-radius:6px; border:1px solid transparent; transition:.12s;}
  .sortbtn:hover{color:var(--ink); background:var(--panel-2);}
  .sortbtn.active{color:var(--gold); border-color:var(--line);}
  .sortbtn i{font-style:normal; font-size:9px; opacity:.9;}
  .arc-list{flex:1; overflow:auto; padding:8px 10px;}
  .arc-card{display:flex; align-items:center; gap:16px; padding:11px 13px; border:1px solid var(--line-soft); border-radius:8px; margin-bottom:7px; cursor:pointer; transition:.12s; background:var(--panel);}
  .arc-card:hover{border-color:var(--ink-faint);}
  .arc-card.sel{border-color:var(--gold); background:var(--panel-2);}
  .arc-card .ac-main{flex:1; min-width:0;}
  .arc-card .t{font-size:13.5px; color:var(--ink); line-height:1.4; margin-bottom:6px;}
  .arc-card .meta{display:flex; gap:6px; align-items:center; flex-wrap:wrap; font-size:10.5px; color:var(--ink-faint);}
  .arc-card .ac-times{text-align:right; white-space:nowrap; font-size:11.5px; color:var(--ink-dim); line-height:1.6; flex-shrink:0;}
  .arc-card .ac-times .lbl{color:var(--ink-faint); margin-right:5px; font-size:10.5px;}
  .arc-card .ac-times .e{color:var(--ink-faint);}
  .arc-card .ac-actions{display:flex; gap:6px; flex-shrink:0; opacity:.35; transition:opacity .12s;}
  .arc-card:hover .ac-actions, .arc-card.sel .ac-actions{opacity:1;}
  .badge{font-size:10px; padding:1px 7px; border-radius:20px; border:1px solid var(--line); color:var(--ink-dim);}
  .badge.tab{border-color:var(--blue); color:#8fa9d6;}
  .dot{width:7px; height:7px; border-radius:50%; display:inline-block;}
  .dot.live{background:var(--green);} .dot.test{background:var(--gold);}
  .arc-main{width:540px; flex-shrink:0; display:flex; flex-direction:column; min-height:0;}
  @media (max-width:820px){ .arc-side{min-width:0;} .arc-main{width:400px;} .arc-card{flex-direction:column; align-items:stretch; gap:7px;} .arc-card .ac-times{text-align:left; display:flex; gap:16px;} }
  .detail-head{padding:11px 16px; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .detail-head .title{font-size:14px; font-weight:600; flex:1 1 100%;}
  .detail-meta{padding:10px 16px; border-top:1px solid var(--line); font-size:12px; color:var(--ink-dim); display:flex; gap:18px; flex-wrap:wrap; flex-shrink:0;}
  .detail-meta b{color:var(--ink-faint); font-weight:500;}

  /* ---------- 編輯公告 ---------- */
  .ed-left{flex:1; display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--line);}
  .ed-actions{padding:10px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--line);}
  .ed-mode{font-size:12.5px; color:var(--gold); font-weight:600; margin-right:4px;}
  .ed-actions .grp{display:flex; gap:6px; align-items:center;}
  .ed-actions .sep{flex:1;}
  .ed-meta{padding:12px 14px; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; border-bottom:1px solid var(--line);}
  .ed-meta .wide{grid-column:span 2;}
  .ed-meta .checks{grid-column:span 4; display:flex; gap:18px; align-items:center; font-size:12.5px; color:var(--ink-dim);}
  .ed-meta .checks label{display:flex; gap:6px; align-items:center; cursor:pointer;}
  .toolbar{display:flex; gap:6px; flex-wrap:wrap; align-items:center; padding:9px 14px; border-bottom:1px solid var(--line);}
  .toolbar .divider{width:1px; align-self:stretch; background:var(--line); margin:2px 3px;}
  .chip{display:inline-flex; align-items:center; gap:7px; padding-left:8px;}
  .chip .sw{width:13px; height:13px; border-radius:3px; border:1px solid rgba(255,255,255,.18);}
  #edSource{flex:1; width:100%; resize:none; border:0; border-radius:0; padding:15px; font-size:14.5px; line-height:1.65; font-family:ui-monospace,Menlo,Consolas,monospace; background:#1a1a22;}
  .ed-status{display:flex; gap:16px; padding:7px 14px; border-top:1px solid var(--line); font-size:12px; color:var(--ink-faint);}
  .ed-status b{color:var(--ink-dim);}
  .ed-right{width:430px; flex-shrink:0; display:flex; flex-direction:column; min-height:0;}
  .ed-right .legend{padding:10px 14px; border-top:1px solid var(--line); display:flex; gap:13px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-faint);}
  .ed-right .legend .it{display:inline-flex; align-items:center; gap:5px;}
  .ed-right .legend .sw{width:10px; height:10px; border-radius:2px;}
  @media (max-width:900px){ .ed-meta{grid-template-columns:repeat(2,1fr);} .ed-meta .wide{grid-column:span 2;} .ed-meta .checks{grid-column:span 2;} .ed-right{width:380px;} }

  /* ---------- 樣板 ---------- */
  .tpl-wrap{flex:1; display:flex; min-height:0;}
  .tpl-list-pane{flex:1; display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--line);}
  .tpl-bar{padding:12px 16px; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .tpl-list{flex:1; overflow:auto; padding:12px; display:flex; flex-direction:column; gap:9px;}
  .tpl-card{border:1px solid var(--line); border-radius:9px; padding:12px 14px; background:var(--panel); cursor:pointer; transition:.12s;}
  .tpl-card:hover{border-color:var(--ink-faint);}
  .tpl-card.sel{border-color:var(--gold); background:var(--panel-2);}
  .tpl-card .hd{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .tpl-card .nm{font-size:14px; font-weight:600;}
  .tpl-card .star{color:var(--gold); font-size:13px;}
  .tpl-card .snip{font-size:11.5px; color:var(--ink-faint); line-height:1.5; max-height:48px; overflow:hidden; white-space:pre-wrap;}
  .tpl-card .row{display:flex; gap:6px; margin-top:9px; flex-wrap:wrap;}
  .tpl-prev-pane{width:430px; flex-shrink:0; display:flex; flex-direction:column; min-height:0;}
  .empty-hint{color:var(--ink-faint); font-size:13px; padding:40px 20px; text-align:center; line-height:1.7;}
  .panel-head{padding:11px 16px; border-bottom:1px solid var(--line); font-size:13px; color:var(--ink-dim); font-weight:600;}
</style>
</head>
<body>
  <div class="nav">
    <h1><span class="dot">◆</span> 公告管理</h1>
    <div class="tabs">
      <button class="tab active" data-view="archive">歷史公告</button>
      <button class="tab" data-view="editor">編輯公告</button>
      <button class="tab" data-view="templates">樣板</button>
    </div>
    <button id="navNew" class="primary" style="margin-left:8px">＋ 開新公告</button>
    <span class="grow"></span>
    <div class="io">
      <button id="btnPush" title="把目前所有公告寫回 Google Sheet">存回雲端</button>
      <button id="btnImport">匯入 Excel</button>
      <button id="btnExport">匯出 Excel</button>
      <input type="file" id="xlsxFile" accept=".xlsx,.xlsm" hidden>
    </div>
    <span class="save-state" id="saveState"></span>
  </div>

  <!-- 歷史公告 -->
  <section class="view active" data-view="archive">
    <aside class="arc-side">
      <div class="filters">
        <input type="text" id="arcSearch" placeholder="搜尋標題或內文…">
        <select id="arcMonth"></select>
        <label style="display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--ink-dim); cursor:pointer; padding:1px 2px;">
          <input type="checkbox" id="arcUnpubOnly"> 只顯示「已上正式服」未勾選
        </label>
        <div style="display:flex; gap:6px;">
          <button class="sm ghost" id="arcAddNew" style="flex:1">＋ 在此月份新增公告</button>
          <button class="sm ghost" id="arcReload" title="重新從 Google Sheet 讀取最新公告（會取代目前畫面的資料）">重新讀取雲端</button>
          <button class="sm ghost" id="arcReseed" title="捨棄所有編輯，還原成內建的歷史資料">還原內建</button>
        </div>
      </div>
      <div class="arc-listhead">
        <div class="lh-left">
          <span class="cnt"><b id="arcCount">0</b> 則</span>
          <span class="sortbtn" data-sort="標題">公告 <i></i></span>
          <span class="sortbtn" data-sort="月份">月份 <i></i></span>
        </div>
        <div class="lh-right">
          <span class="sortbtn" data-sort="發布日期">開始時間 <i></i></span>
          <span class="sortbtn" data-sort="結束日期">結束時間 <i></i></span>
        </div>
      </div>
      <div class="arc-list" id="arcList"></div>
    </aside>
    <main class="arc-main">
      <div class="detail-head">
        <span class="title" id="arcTitle">選擇左側一則公告</span>
      </div>
      <div class="preview-wrap">
        <div class="mockup" id="arcMock">
          <div class="g-tabs"><span class="on">活動公告</span><span>系統公告</span></div>
          <div class="g-title" id="arcGTitle"></div>
          <div class="g-sub">L I G H T &nbsp; A N D &nbsp; N I G H T</div>
          <div class="pv" id="arcPreview"><div class="pv-empty">尚未選擇公告</div></div>
        </div>
      </div>
      <div class="detail-meta" id="arcMeta"></div>
    </main>
  </section>

  <!-- 編輯公告 -->
  <section class="view" data-view="editor">
    <div class="ed-left">
      <div class="ed-actions">
        <span class="ed-mode" id="edMode">新公告</span>
        <div class="grp">
          <button id="edBlank">空白</button>
          <select id="edTplPick"><option value="">套用樣板…</option></select>
        </div>
        <span class="sep"></span>
        <button id="edSaveTpl">存為樣板</button>
        <button id="edCopy">全部複製</button>
        <button class="primary" id="edSave">儲存</button>
      </div>

      <div class="ed-meta">
        <label class="fld wide">標題<input type="text" id="m_title"></label>
        <label class="fld">所屬月份<select id="m_month"></select></label>
        <label class="fld">頁籤<input type="text" id="m_tab"></label>
        <label class="fld">連結<input type="text" id="m_link" placeholder="lv://…"></label>
        <label class="fld">發布日期<input type="text" id="m_start" placeholder="2026-08-05 05:00"></label>
        <label class="fld">結束日期<input type="text" id="m_end" placeholder="2026-08-12 04:59"></label>
        <label class="fld">ID<input type="text" id="m_id"></label>
        <label class="fld">順位<input type="text" id="m_order"></label>
        <div class="checks">
          <label><input type="checkbox" id="m_live"> 已上正式服</label>
          <label><input type="checkbox" id="m_test"> 測試服公告</label>
        </div>
      </div>

      <div class="toolbar">
        <button class="chip" data-color="6f6e7c"><span class="sw" style="background:#6f6e7c"></span>內文</button>
        <button class="chip" data-color="b59974"><span class="sw" style="background:#b59974"></span>標題</button>
        <button class="chip" data-color="5c7bbb"><span class="sw" style="background:#5c7bbb"></span>重點</button>
        <button class="chip" data-color="c04752"><span class="sw" style="background:#c04752"></span>警語</button>
        <div class="divider"></div>
        <input type="color" id="customColor" value="#b59974" title="自訂顏色">
        <button id="applyCustom">套用此色</button>
        <div class="divider"></div>
        <button id="insHeader">┃標題框┃</button>
        <button id="insImage">插入圖片</button>
        <button id="insSplit">插入分段 #|#</button>
      </div>

      <textarea id="edSource" spellcheck="false" placeholder="在這裡輸入公告內容…"></textarea>
      <div class="ed-status">
        <span>字數 <b id="cCount">0</b></span>
        <span>段數 <b id="sCount">0</b></span>
        <span>圖片 <b id="iCount">0</b></span>
        <span style="margin-left:auto">選取文字後點顏色即可包色</span>
      </div>
    </div>
    <div class="ed-right">
      <div class="panel-head">📱 實際版面預覽</div>
      <div class="preview-wrap">
        <div class="mockup">
          <div class="g-tabs"><span class="on">活動公告</span><span>系統公告</span></div>
          <div class="g-title" id="edGTitle"></div>
          <div class="g-sub">L I G H T &nbsp; A N D &nbsp; N I G H T</div>
          <div class="pv" id="edPreview"></div>
        </div>
      </div>
      <div class="legend">
        <span class="it"><span class="sw" style="background:#6f6e7c"></span>內文 6f6e7c</span>
        <span class="it"><span class="sw" style="background:#b59974"></span>標題 b59974</span>
        <span class="it"><span class="sw" style="background:#5c7bbb"></span>重點 5c7bbb</span>
        <span class="it"><span class="sw" style="background:#c04752"></span>警語 c04752</span>
      </div>
    </div>
  </section>

  <!-- 樣板 -->
  <section class="view" data-view="templates">
    <div class="tpl-wrap">
      <div class="tpl-list-pane">
        <div class="tpl-bar">
          <button class="primary" id="tplNew">用目前編輯內容建立樣板</button>
          <span class="sep" style="flex:1"></span>
          <button id="tplExport">匯出全部</button>
          <button id="tplImport">匯入</button>
          <input type="file" id="tplFile" accept="application/json" hidden>
        </div>
        <div class="tpl-list" id="tplList"></div>
      </div>
      <div class="tpl-prev-pane">
        <div class="panel-head">📱 樣板預覽</div>
        <div class="preview-wrap">
          <div class="mockup">
            <div class="g-tabs"><span class="on">活動公告</span><span>系統公告</span></div>
            <div class="g-title" id="tplGTitle"></div>
            <div class="g-sub">L I G H T &nbsp; A N D &nbsp; N I G H T</div>
            <div class="pv" id="tplPreview"><div class="pv-empty">選擇或建立樣板</div></div>
          </div>
        </div>
      </div>
    </div>
  </section>

<script src="archive.js"></script>
<script src="xlsx.full.min.js"></script>
<script>
/* ============ 解析引擎（與遊戲內顯示一致） ============ */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function parseSource(raw){
  raw=(raw||'').replace(/\r\n/g,'\n');
  const parts=raw.split('#|#'); let html='';
  parts.forEach(part=>{
    const t=part.trim(); if(!t) return;
    if(t.startsWith('http://')||t.startsWith('https://')){
      html+=`<img class="pv-image" src="${t.replace(/"/g,'&quot;')}" alt="Banner" onerror="this.outerHTML='<div class=\\'pv-image-error\\'>圖片載入失敗<br><small>請確認網址，或是否需連線 VPN</small></div>'">`;
    }else{
      let x=esc(part.replace(/^\n/,'')).replace(/\[([a-fA-F0-9]{6})\]/g,'<span style="color:#$1;">').replace(/\[-\]/g,'</span>').replace(/\n/g,'<br>');
      html+=`<div class="pv-text">${x}</div>`;
    }
  });
  return html;
}
function renderGame(bodyEl,titleEl,raw,title){
  if(titleEl){ titleEl.textContent=title||''; titleEl.style.display=title?'block':'none'; }
  bodyEl.innerHTML=parseSource(raw)||'<div class="pv-empty">（無內容）</div>';
}
function statsOf(raw){
  raw=(raw||'').replace(/\r\n/g,'\n');
  const segs=raw.split('#|#').map(s=>s.trim()).filter(Boolean);
  return {chars:raw.length, segs:segs.length, imgs:segs.filter(s=>s.startsWith('http://')||s.startsWith('https://')).length};
}
function effectiveSource(it){
  let src=it['內文']||'';
  const asset=(it['圖素']||'').trim();
  // 圖素併入公告內容：內文有字就接在後面（以 #|# 分段），否則直接當純圖片公告
  if(asset && src.indexOf(asset)===-1){
    src = src.trim() ? src.replace(/\s+$/,'')+'#|#'+asset : asset;
  }
  return src;
}
function isTrue(v){return v===true||v==='True'||v==='TRUE'||v===1;}

/* ============ Google Sheet 雲端同步（Apps Script 網頁應用程式） ============ */
// ★ 把你部署好的 Apps Script「網頁應用程式」/exec 網址貼在這裡：
const WEBAPP_URL='https://script.google.com/macros/s/AKfycbwYZtL-8KkKRAdPMmf-DSzFcyiQIF--3tt64ep1tSKLozj6tPziE6167Usno7A5FOKk/exec';   // 例：https://script.google.com/macros/s/AKfycb..../exec
function cloudOn(){ return /^https?:\/\/.+\/exec/i.test(WEBAPP_URL); }

// 讀取：GET 網頁應用程式 → { months:[{month,hidden,items:[...]}] }
async function loadFromCloud(loud){
  if(!cloudOn()){ if(loud) alert('還沒設定雲端網址。\n請把 Apps Script 的 /exec 網址填到 index.html 最上面的 WEBAPP_URL。'); return; }
  flash('讀取雲端資料中…');
  try{
    const res=await fetch(WEBAPP_URL,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=JSON.parse(await res.text());
    const months=(data&&data.months)||[];
    if(!months.length) throw new Error('雲端沒有任何資料');
    DATA=months; saveData(); refreshMonthPickers(); arcSel=null; renderArcList();
    flash('已讀取雲端：'+months.reduce((n,m)=>n+(m.items?m.items.length:0),0)+' 則');
  }catch(err){
    console.error('雲端讀取失敗：',err);
    flash('雲端讀取失敗，沿用本機資料');
    if(loud) alert('讀取雲端失敗：'+err.message);
  }
}
// 寫回：POST 目前 DATA 回網頁應用程式（用 text/plain 避免 CORS 預檢）
async function pushToCloud(){
  if(!cloudOn()){ alert('還沒設定雲端網址（WEBAPP_URL）。'); return; }
  const total=DATA.reduce((n,m)=>n+(m.items?m.items.length:0),0);
  if(!confirm('要把目前 '+DATA.length+' 個月份、共 '+total+' 則公告「寫回」Google Sheet 嗎？\n這會覆蓋雲端上同名月份分頁的內容。')) return;
  flash('寫回雲端中…');
  try{
    const res=await fetch(WEBAPP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({months:DATA})});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=JSON.parse(await res.text());
    if(!data.ok) throw new Error(data.error||'未知錯誤');
    flash('已寫回雲端：'+data.months+' 個月份');
  }catch(err){
    console.error('寫回失敗：',err);
    flash('寫回失敗');
    alert('寫回雲端失敗：'+err.message+'\n\n（資料仍保留在本機，沒有遺失）');
  }
}

function toTime(s){ if(!s) return null; const d=new Date(String(s).replace(' ','T')); return isNaN(d)?null:d.getTime(); }
function sortRows(rows){
  const {key,dir}=sortState, sgn=dir==='asc'?1:-1;
  return rows.sort((a,b)=>{
    let r;
    if(key==='發布日期'||key==='結束日期'){
      const ta=toTime(a.it[key]), tb=toTime(b.it[key]);
      if(ta===null&&tb===null) r=0; else if(ta===null) return 1; else if(tb===null) return -1; else r=ta-tb;
    }else if(key==='月份'){ r=String(a.month).localeCompare(String(b.month)); }
    else { r=String(a.it['標題']||'').localeCompare(String(b.it['標題']||''),'zh-Hant'); }
    return r*sgn;
  });
}

function refreshMonthPickers(){
  let opt='<option value="">全部月份</option>';
  DATA.forEach(m=>{ if(m.items.length) opt+=`<option value="${esc(m.month)}">${esc(m.month)}${m.hidden?'（隱藏）':''}　${m.items.length} 則</option>`; });
  const cur=arcMonthSel.value; arcMonthSel.innerHTML=opt; arcMonthSel.value=cur;
  let mo='<option value="">— 選擇月份 —</option>';
  DATA.forEach(m=> mo+=`<option value="${esc(m.month)}">${esc(m.month)}</option>`);
  mo+='<option value="__new__">＋ 新增月份…</option>';

}
function arcFiltered(){

    m.items.forEach((it,idx)=>{

      if(unpub && isTrue(it['已上正式服'])) return;
      out.push({month:m.month,hidden:m.hidden,idx,it});
    });
  });

}

      else if(act==='default'){ const on=!t.default; templates.forEach(x=>x.default=false); t.default=on; persistTpl(); renderTplList(); refreshTplPicker(); }
      else if(act==='rename'){ const n=prompt('新名稱：',t.name); if(n){t.name=n.trim(); persistTpl(); renderTplList(); refreshTplPicker(); if(editingTpl===t.id)setMode();} }
      else if(act==='del'){ if(confirm('刪除樣板「'+t.name+'」？')){ templates=templates.filter(x=>x.id!==t.id); if(tplSel&&tplSel.id===t.id)tplSel=null; if(editingTpl===t.id)editingTpl=null; persistTpl(); renderTplList(); refreshTplPicker(); setMode(); } }
    }));
  });
}
function applyTemplate(t){
  if(edSource.value.trim()&&!confirm('使用樣板創建新的公告？')) return;
  const m=t.meta||{};
  arcSel=null; editingRef=null; editingTpl=null;
  setItem({'標題':m['標題'],'頁籤':m['頁籤'],'連結':m['連結'],'發布日期':m['發布日期'],'結束日期':m['結束日期'],'內文':t.source||''});
  edRender(); renderArcList(); activateView('editor');
}
function editTemplateContent(t){
  // 進入「編輯這個樣板本身」模式：載進編輯器，按「儲存樣板變更」會覆蓋原樣板
  const m=t.meta||{};
  arcSel=null; editingRef=null; editingTpl=t.id;
  setItem({'標題':m['標題'],'頁籤':m['頁籤'],'連結':m['連結'],'發布日期':m['發布日期'],'結束日期':m['結束日期'],'內文':t.source||''});
  edRender(); renderArcList(); activateView('editor');
}
function refreshTplPicker(){
  const sel=document.getElementById('edTplPick'); let o='<option value="">套用樣板…</option>';
  templates.slice().sort((a,b)=>(b.default?1:0)-(a.default?1:0)).forEach(t=>o+=`<option value="${t.id}">${t.default?'★ ':''}${esc(t.name)}</option>`);
  sel.innerHTML=o;
}
document.getElementById('edTplPick').addEventListener('change',e=>{ const t=templates.find(x=>x.id==e.target.value); e.target.value=''; if(t) applyTemplate(t); });
document.getElementById('tplNew').addEventListener('click',saveTemplateFromEditor);
document.getElementById('tplExport').addEventListener('click',()=>downloadBlob(JSON.stringify(templates,null,2),'announcement-templates.json','application/json'));
document.getElementById('tplImport').addEventListener('click',()=>document.getElementById('tplFile').click());
document.getElementById('tplFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ try{ const arr=JSON.parse(r.result); if(Array.isArray(arr)){ const merge=confirm('按「確定」合併到現有樣板，按「取消」整批取代。'); templates=merge?templates.concat(arr):arr; persistTpl(); renderTplList(); refreshTplPicker(); flash('匯入完成'); } else alert('檔案格式不符。'); }catch(_){alert('無法解析 JSON。');} e.target.value=''; };
  r.readAsText(f);
});

/* ============ Excel 匯入 / 匯出 ============ */
document.getElementById('btnExport').addEventListener('click',()=>{
  const wb=XLSX.utils.book_new(); const used={};
  DATA.forEach(m=>{
    if(!m.items.length) return;
    const aoa=FIELDS.map(f=>[f, ...m.items.map(it=>{
      const v=it[f]; if(typeof v==='boolean') return v; return v===undefined||v===null?'':v;
    })]);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    let name=String(m.month).replace(/[\[\]\:\*\?\/\\]/g,'').slice(0,31)||'Sheet';
    while(used[name]) name=(name+'_').slice(0,31); used[name]=1;
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`遊戲內公告集中_${today}.xlsx`);
  flash('已匯出 Excel');
});
document.getElementById('btnImport').addEventListener('click',()=>document.getElementById('xlsxFile').click());
document.getElementById('btnPush').addEventListener('click',pushToCloud);
document.getElementById('xlsxFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  if(!confirm('匯入會以這個 Excel 的內容「取代」目前的工作資料（樣板不受影響）。\n建議先用「匯出 Excel」備份。確定匯入？')){ e.target.value=''; return; }
  flash('讀取中…');
  const r=new FileReader();
  r.onload=()=>{ try{
    const wb=XLSX.read(new Uint8Array(r.result),{type:'array'});
    const months=[];
    wb.SheetNames.forEach(sn=>{
      const ws=wb.Sheets[sn];
      const aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:''});
      if(!aoa.length) { months.push({month:sn,hidden:false,items:[]}); return; }
      const labels=aoa.map(row=>row&&row.length?String(row[0]).trim():'');
      const ncol=Math.max(...aoa.map(r=>r.length),0);
      const items=[];
      for(let ci=1;ci<ncol;ci++){
        const rec={}; let has=false;
        labels.forEach((lab,ri)=>{ if(!lab) return; let v=aoa[ri][ci]; if(v===undefined)v='';
          if(lab==='已上正式服'||lab==='測試服公告') v=isTrue(v);
          else v=(typeof v==='boolean')?v:String(v);
          rec[lab]=v; if((lab==='標題'||lab==='內文')&&String(v).trim()) has=true; });
        if(has) items.push(rec);
      }
      months.push({month:sn,hidden:(ws['!sheetHidden']?true:false),items});
    });
    if(!months.some(m=>m.items.length)){ alert('在這個 Excel 裡找不到公告資料。請確認格式（A 欄為欄位名、每一直行為一則公告）。'); e.target.value=''; return; }
    DATA=months; saveData(); refreshMonthPickers(); arcSel=null; renderArcList();
    activateView('archive');
    flash('匯入完成：'+months.reduce((n,m)=>n+m.items.length,0)+' 則');
  }catch(err){ alert('匯入失敗：'+err.message); } e.target.value=''; };
  r.readAsArrayBuffer(f);
});

/* ============ 小工具 ============ */
async function copyText(text,btn){
  try{ await navigator.clipboard.writeText(text); }
  catch(_){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
  if(btn){ const o=btn.textContent; btn.textContent='已複製 ✓'; setTimeout(()=>btn.textContent=o,1200); }
}
function downloadBlob(content,name,type){ const b=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
let flashT=null;
function flash(msg){ const ss=document.getElementById('saveState'); ss.textContent=msg; ss.classList.add('on'); clearTimeout(flashT); flashT=setTimeout(()=>{ss.textContent='';ss.classList.remove('on');},1800); }
function flashSaved(){ const ss=document.getElementById('saveState'); ss.textContent='已儲存'; ss.classList.add('on'); clearTimeout(flashT); flashT=setTimeout(()=>{ss.textContent='';ss.classList.remove('on');},1500); }

/* ============ 啟動 ============ */
(function init(){
  refreshMonthPickers(); updateSortUI(); renderArcList(); refreshTplPicker();
  setItem({}); edRender();
  loadFromCloud(false); // 開網頁預設讀取雲端（未設定 WEBAPP_URL 則沿用本機資料）
})();
</script>
